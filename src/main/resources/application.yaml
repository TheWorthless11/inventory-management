server:
  port: 8081
spring:
  application:
    name: inventory-management

  # 1. DATABASE CONNECTION (The "Where" and "How")
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver # Driver: The specific Java library used to communicate with PostgreSQL.

  # 2. JPA & HIBERNATE (The "Database Builder") the what
  jpa:
    hibernate:
      # ddl-auto: 'update' is the most important setting for beginners.
      # It tells Hibernate: "Look at my Java classes. If a table is missing in the DB, create it!"
      ddl-auto: update
    show-sql: true # This will print the SQL queries generated by Hibernate to the console, which is useful for debugging and understanding how your application interacts with the database.

    properties:
      hibernate:
        format_sql: true # This makes the printed SQL queries easier to read by formatting them with line breaks and indentation.

  # 3. thymeleaf (The "View Engine" or forntend)
  thymeleaf:
      cache: false # Enables caching for better performance, but set to 'false' during development
                   # so you can see HTML changes immediately without restarting the app.
