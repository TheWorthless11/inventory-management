name: CI

# Run this workflow whenever code is pushed or a PR is opened/updated.
on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  test:
    # Use Ubuntu because Maven + Java setup is quick and stable here.
    runs-on: ubuntu-latest

    # These env vars match src/main/resources/application.yaml placeholders.
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/inventory_mgmt
      SPRING_DATASOURCE_USERNAME: test_user
      SPRING_DATASOURCE_PASSWORD: test_password

    steps:
      # Download repository code.
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Java and cache Maven dependencies for faster CI runs.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # Install and start PostgreSQL directly on the runner to avoid Docker Hub pull limits.
      - name: Install and start PostgreSQL
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql postgresql-contrib
          sudo systemctl start postgresql

      # Create DB and user used by tests (idempotent).
      - name: Prepare test database
        run: |
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='test_user'" | grep -q 1; then
            sudo -u postgres psql -c "CREATE ROLE test_user LOGIN PASSWORD 'test_password';"
          fi
          if ! sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='inventory_mgmt'" | grep -q 1; then
            sudo -u postgres createdb -O test_user inventory_mgmt
          fi
          pg_isready -h localhost -p 5432

      # Ensure Maven wrapper script can run on Linux.
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Build and run all tests.
      - name: Run tests
        run: ./mvnw -B clean test
